openapi: 3.1.0
info:
  title: Agricultural federation API
  description: |
    # Versioning
    This API uses semantic versioning (MAJOR.MINOR.PATCH). Available versions are : 
    - v0.0.1 (2026-04-21) : POST /collectivities for collectivities creation and POST /members for members creation.
    - v0.1.0 (2026-04-22) : PUT /collectivities/{collectivityId}/official-identifier for assigning unique number and name.
  version: 0.1.0
servers:
  - url: 'https://localhost:8080'
paths:
  '/collectivities':
    post:
      summary: Create list of collectivities
      description: |
        During collectivity request body creation, only members ID are provided to identify members. 
        But the response content includes members information, not only their IDs.
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateCollectivity'
      responses:
        201:
          description: List of created collectivities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivity'
        400:
          description: Collectivity without federation approval or structure missing.
        404:
          description: Member not found.
  '/members':
    post:
      summary: Create list of members
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/CreateMember'
      responses:
        201:
          description: List of created members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Member'
        400:
          description: |
            The following case must return a bad request exception : 
            - Member with bad referees or without proper payment.
            - Membership dues not paid or registration fee not paid.
        404:
          description: Either collectivity or member not found.
  '/collectivities/{collectivityId}/official-identifier':
    put:
      summary: Assign official number and unique name to a collectivity
      description: |
        This endpoint allows the federation to assign an official number and a unique name to a collectivity.
        
        Rules:
        - If only `name` is provided, the system automatically generates a unique `number`.
        - If only `number` is provided, the system automatically generates a unique `name` based on the collectivity location.
        - If both are provided, they must be valid and unique.
        - Once assigned, neither the `number` nor the `name` can be modified.
      parameters:
        - name: collectivityId
          in: path
          required: true
          schema:
            type: string
          description: The unique identifier of the collectivity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OfficialIdentifierRequest'
      responses:
        200:
          description: Official identifier successfully assigned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CollectivityWithOfficialIdentifier'
        400:
          description: |
            Bad request - The following cases return 400:
            - Provided name already exists
            - Provided number already exists
            - Generated name already exists (system tries to generate but conflict occurs)
            - Generated number already exists (rare case)
            - Invalid name format (e.g., empty, too long)
            - Invalid number format (e.g., negative, wrong pattern)
        403:
          description: |
            Forbidden - Cannot modify an already assigned official identifier:
            - Attempting to change an existing official number
            - Attempting to change an existing official name
        404:
          description: Collectivity not found
components:
  schemas:
    OfficialIdentifierRequest:
      type: object
      properties:
        number:
          type: string
          description: Official number of the collectivity (optional, generated if not provided)
          example: "F-2026-001"
        name:
          type: string
          description: Unique name of the collectivity (optional, generated if not provided)
          example: "Union Agricole du Centre"
    CollectivityWithOfficialIdentifier:
      type: object
      allOf:
        - $ref: '#/components/schemas/Collectivity'
      properties:
        officialNumber:
          type: string
          description: Official number assigned by the federation
          example: "F-2026-001"
        officialName:
          type: string
          description: Unique name assigned by the federation
          example: "Union Agricole du Centre"
    CreateCollectivity:
      type: object
      properties:
        location:
          type: string
        members:
          type: array
          items:
            schema:
              $ref: '#/components/schemas/MemberIdentifier'
        federationApproval:
          type: boolean
        structure:
          $ref: '#/components/schemas/CreateCollectivityStructure'
    CreateCollectivityStructure:
      type: object
      properties:
        president:
          $ref: '#/components/schemas/MemberIdentifier'
        vicePresident:
          $ref: '#/components/schemas/MemberIdentifier'
        treasurer:
          $ref: '#/components/schemas/MemberIdentifier'
        secretary:
          $ref: '#/components/schemas/MemberIdentifier'
    CollectivityStructure:
      type: object
      properties:
        president:
          $ref: '#/components/schemas/Member'
        vicePresident:
          $ref: '#/components/schemas/Member'
        treasurer:
          $ref: '#/components/schemas/Member'
        secretary:
          $ref: '#/components/schemas/Member'
    Collectivity:
      type: object
      properties:
        id:
          type: string
        location:
          type: string
        structure:
          $ref: '#/components/schemas/CollectivityStructure'
        members: 0
        type: array
        items:
              $ref: '#/components/schemas/Member'
    MemberIdentifier:
      type: string
    CreateMember:
      type: object
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      properties:
        collectivityIdentifier:
          type: string
        referees:
          type: array
          items:
            $ref: '#/components/schemas/MemberIdentifier'
        registrationFeePaid:
          type: boolean
        membershipDuesPaid:
          type: boolean
    MemberInformation:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          $ref: '#/components/schemas/Gender'
        address:
          type: string
        profession:
          type: string
        phoneNumber:
          type: integer
        email:
          type: string
        occupation:
          $ref: '#/components/schemas/MemberOccupation'
    Member:
      type: object
      allOf:
        - $ref: '#/components/schemas/MemberInformation'
      properties:
        id:
          $ref: '#/components/schemas/MemberIdentifier'
        referees:
          type: array
          items:
            $ref: '#/components/schemas/Member'
    Gender:
      type: string
      enum:
        - MALE
        - FEMALE
    MemberOccupation:
      type: string
      enum:
        - JUNIOR
        - SENIOR
        - SECRETARY
        - TREASURER
        - VICE_PRESIDENT
        - PRESIDENT