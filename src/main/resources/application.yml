server:
  port: 8080

spring:
  application:
    name: federation-api
  datasource:
    url: jdbc:h2:~/federation_db
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
      platform: h2
  jpa:
    defer-datasource-initialization: true
  h2:
    console:
      enabled: true
      path: /h2-console